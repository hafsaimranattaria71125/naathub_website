<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Naat Hub</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast-success { background: #28a745; }
        .toast-error { background: #dc3545; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <i class="fas fa-mosque"></i> Naat Hub
            </a>
            <div class="nav-links">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/naats.html"><i class="fas fa-music"></i> Naats</a>
                <a href="/profile.html" class="active"><i class="fas fa-user"></i> Profile</a>
                <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="profile-container">
            <!-- Profile Info -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="profile-info">
                        <h2 id="profileName">Loading...</h2>
                        <p id="profileEmail">Loading...</p>
                        <p id="profileRole" class="role-badge">Loading...</p>
                    </div>
                </div>
                
                <div class="profile-stats">
                    <div class="stat">
                        <i class="fas fa-music"></i>
                        <span id="uploadCount">0</span>
                        <small>Naats Uploaded</small>
                    </div>
                    <div class="stat">
                        <i class="fas fa-heart"></i>
                        <span id="totalLikes">0</span>
                        <small>Total Likes</small>
                    </div>
                    <div class="stat">
                        <i class="fas fa-calendar"></i>
                        <span id="memberSince">-</span>
                        <small>Member Since</small>
                    </div>
                </div>
            </div>
            
            <!-- Edit Profile Form -->
            <div class="profile-card">
                <h3><i class="fas fa-edit"></i> Edit Profile</h3>
                <form id="editProfileForm">
                    <div class="form-group">
                        <label for="editFullName"><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="editFullName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="editBio"><i class="fas fa-file-alt"></i> Bio</label>
                        <textarea id="editBio" rows="3" placeholder="Tell us about yourself..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>
            </div>
            
            <!-- Danger Zone (Hidden for Admin) -->
            <div id="dangerZone" class="profile-card danger-zone">
                <h3><i class="fas fa-exclamation-triangle"></i> Danger Zone</h3>
                <p>These actions are permanent and cannot be undone.</p>
                
                <button onclick="deleteAccount()" class="btn btn-danger">
                    <i class="fas fa-trash"></i> Delete My Account
                </button>
                
                <small>This will delete all your naats, comments, and profile data.</small>
            </div>
        </div>
        
        <!-- My Uploads -->
        <div class="my-uploads" id="myUploadsSection">
            <h3><i class="fas fa-cloud-upload-alt"></i> My Uploads</h3>
            <div id="myUploads" class="naats-grid">
                <!-- User's naats will be loaded here -->
            </div>
        </div>
        
        <!-- Reports Management Section -->
        <div id="reportsSection" class="hidden">
            <h3><i class="fas fa-flag"></i> Reports Management</h3>
            
            <div class="reports-tabs">
                <button id="allReportsTab" class="tab-btn" onclick="showReportsTab('all')">
                    <i class="fas fa-list"></i> All Reports
                </button>
                <button id="myReportsTab" class="tab-btn" onclick="showReportsTab('my')">
                    <i class="fas fa-user"></i> My Reports
                </button>
                <button id="pendingReportsTab" class="tab-btn" onclick="showReportsTab('pending')">
                    <i class="fas fa-clock"></i> Pending
                </button>
            </div>
            
            <div class="reports-controls">
                <button onclick="loadReports(currentReportsTab)" class="btn btn-refresh">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
            
            <div id="reportsList" class="reports-list">
                <!-- Reports will be loaded here -->
            </div>
            
            <div id="reportsPagination" class="pagination">
                <!-- Pagination for reports -->
            </div>
        </div>
    </div>

    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Profile page loaded, initializing...');
            
            // Setup logout listener
            const logoutLink = document.getElementById('logoutLink');
            if (logoutLink) {
                logoutLink.addEventListener('click', async function(e) {
                    e.preventDefault();
                    console.log('Logout clicked');
                    try {
                        await fetch('/api/auth/logout', { 
                            method: 'POST',
                            credentials: 'include'
                        });
                        window.location.href = '/';
                    } catch (error) {
                        console.error('Logout error:', error);
                        showToast('Logout failed', 'error');
                    }
                });
            }
            
            // Then check authentication
            checkAuth();
        });

        // Authentication check with redirect
        async function checkAuth() {
            try {
                console.log('Checking authentication...');
                const response = await fetch('/api/auth/me', {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    // Get current page URL for redirect after login
                    const currentPage = window.location.pathname + window.location.search;
                    console.log('Not authenticated, redirecting to login');
                    window.location.href = `/login.html?redirect=${encodeURIComponent(currentPage)}`;
                    return;
                }
                
                const data = await response.json();
                console.log('Auth response:', data);
                
                if (data.success && data.user) {
                    window.currentUser = data.user;
                    console.log('User authenticated:', data.user.email);
                    
                    // Load profile data
                    loadProfile(data.user);
                    loadMyUploads();
                    
                    // Setup reports section based on role
                    setupReportsSection(data.user);
                } else {
                    throw new Error('Authentication failed');
                }
            } catch (error) {
                console.error('Auth error:', error);
                const currentPage = window.location.pathname + window.location.search;
                window.location.href = `/login.html?redirect=${encodeURIComponent(currentPage)}`;
            }
        }
        
        async function loadProfile(user) {
            console.log('Loading profile for:', user);
            document.getElementById('profileName').textContent = user.full_name || user.name || user.email;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profileRole').textContent = user.role || 'user';
            
            // Set form values
            document.getElementById('editFullName').value = user.full_name || user.name || '';
            document.getElementById('editBio').value = user.bio || '';
            
            // Format member since date
            if (user.created_at) {
                const date = new Date(user.created_at);
                document.getElementById('memberSince').textContent = date.toLocaleDateString();
            }
            
            // Hide danger zone for admin
            if (user.role === 'admin') {
                document.getElementById('dangerZone').classList.add('hidden');
                console.log('Danger zone hidden for admin');
            }
        }
        
        function setupReportsSection(user) {
            const reportsSection = document.getElementById('reportsSection');
            
            // Show reports section for all users except basic users
            if (user.role === 'user') {
                // Regular users see only "My Reports"
                reportsSection.classList.remove('hidden');
                document.getElementById('allReportsTab').classList.add('hidden');
                document.getElementById('pendingReportsTab').classList.add('hidden');
                document.getElementById('myReportsTab').classList.add('active');
                loadReports('my');
            } else if (user.role === 'artist' || user.role === 'moderator' || user.role === 'admin') {
                // Artists, moderators, and admin see all tabs
                reportsSection.classList.remove('hidden');
                document.getElementById('allReportsTab').classList.add('active');
                document.getElementById('myReportsTab').classList.remove('active');
                document.getElementById('pendingReportsTab').classList.remove('active');
                loadReports('all');
            }
        }
        
        async function loadMyUploads() {
    try {
        console.log('Loading my uploads from /api/naats/user/my-uploads');
        const response = await fetch('/api/naats/user/my-uploads', {
            credentials: 'include'
        });
        
        const data = await response.json();
        console.log('My uploads API response:', data);
        
        if (data.success) {
            const myUploads = data.data || [];
            console.log('Number of my uploads:', myUploads.length);
            displayMyUploads(myUploads);
            
            // Update stats
            document.getElementById('uploadCount').textContent = myUploads.length;
            const totalLikes = myUploads.reduce((sum, naat) => sum + (naat.like_count || 0), 0);
            document.getElementById('totalLikes').textContent = totalLikes;
        }
    } catch (error) {
        console.error('Error loading uploads:', error);
    }
}
        
        function displayMyUploads(uploads) {
            const container = document.getElementById('myUploads');
            
            if (!uploads || uploads.length === 0) {
                container.innerHTML = '<div class="empty-state">You haven\'t uploaded any naats yet.</div>';
                return;
            }
            
            container.innerHTML = uploads.map(naat => `
                <div class="naat-card">
                    <div class="naat-header">
                        <h3>${naat.title}</h3>
                        <span class="category">${naat.category}</span>
                    </div>
                    
                    <div class="naat-info">
                        <p><i class="fas fa-clock"></i> ${formatTime(naat.duration_seconds)}</p>
                        <p><i class="fas fa-heart"></i> ${naat.like_count} likes</p>
                        <p><i class="fas fa-calendar"></i> ${new Date(naat.created_at).toLocaleDateString()}</p>
                    </div>
                    
                    <div class="naat-actions">
                        <button onclick="playNaat('${naat.audio_filename}')" class="btn-play">
                            <i class="fas fa-play"></i> Play
                        </button>
                        <button onclick="deleteNaat(${naat.naat_id})" class="btn-danger">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // Edit Profile Form
        document.getElementById('editProfileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                full_name: document.getElementById('editFullName').value,
                bio: document.getElementById('editBio').value
            };
            
            try {
                const response = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Profile updated successfully!', 'success');
                    loadProfile(data.user);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('Error updating profile', 'error');
            }
        });
        
        async function deleteNaat(naatId) {
            if (!confirm('Are you sure you want to delete this naat? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/naats/${naatId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Naat deleted successfully', 'success');
                    loadMyUploads();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('Error deleting naat', 'error');
            }
        }
        
        async function deleteAccount() {
            if (!confirm('ARE YOU SURE? This will permanently delete your account and all your data. This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch('/api/users/profile', {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Account deleted successfully', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('Error deleting account', 'error');
            }
        }
        
        function playNaat(filename) {
            // Direct redirect to MP3 file
            window.location.href = `/Public/${filename}`;
        }function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Reports functions
        let currentReportsTab = 'all';
        
        function showReportsTab(tab) {
            const userRole = window.currentUser?.role;
            
            // Only regular users are restricted to "my" tab
            if (userRole === 'user' && tab !== 'my') {
                showToast('You can only view your own reports', 'error');
                return;
            }
            
            currentReportsTab = tab;
            
            // Update active tab
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            event.target.classList.add('active');
            
            // Load appropriate reports
            loadReports(tab);
        }
        
        async function loadReports(tab = 'all') {
            const container = document.getElementById('reportsList');
            const userRole = window.currentUser?.role;
            
            // Only regular users are restricted to "my" tab
            if (userRole === 'user' && tab !== 'my') {
                container.innerHTML = '<div class="empty-state">You can only view your own reports</div>';
                return;
            }
            
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading reports...</div>';
            
            try {
                let url = '/api/reports';
                
                // For "My Reports", fetch user-specific reports
                if (tab === 'my') {
                    url = '/api/reports/user';
                }
                
                const response = await fetch(url, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    if (response.status === 403) {
                        container.innerHTML = '<div class="empty-state">You are not authorized to view reports</div>';
                        return;
                    }
                    
                    if (response.status === 404) {
                        container.innerHTML = '<div class="empty-state">No reports found</div>';
                        return;
                    }
                    
                    throw new Error('Failed to load reports');
                }
                
                const data = await response.json();
                
                if (data.success) {
                    let reports = data.reports || [];
                    
                    // For "Pending" tab, filter reports
                    if (tab === 'pending') {
                        reports = reports.filter(r => r.status === 'pending');
                    }
                    
                    displayReports(reports, tab);
                } else {
                    container.innerHTML = '<div class="error">Failed to load reports</div>';
                }
            } catch (error) {
                console.error('Error loading reports:', error);
                container.innerHTML = '<div class="error">Error loading reports</div>';
            }
        }
        
        function displayReports(reports, tab) {
            const container = document.getElementById('reportsList');
            const userRole = window.currentUser?.role;
            
            if (!reports || reports.length === 0) {
                container.innerHTML = '<div class="empty-state">No reports found</div>';
                return;
            }
            
            container.innerHTML = reports.map(report => `
                <div class="report-card ${report.status}">
                    <div class="report-header">
                        <div>
                            <h4>Report #${report.report_id}</h4>
                            <div class="report-meta">
                                <span class="report-type">${report.report_type}</span>
                                <span class="report-date">${new Date(report.created_at).toLocaleDateString()}</span>
                                ${(userRole === 'admin' || userRole === 'moderator') && tab !== 'my' ? 
                                    `<span class="reporter">By: ${report.reporter_name || 'User #' + report.reporter_id}</span>` : ''}
                            </div>
                        </div>
                        <div class="report-status-badge">
                            <span class="status ${report.status}">${report.status}</span>
                        </div>
                    </div>
                    
                    <div class="report-content">
                        <div class="report-details">
                            ${report.reported_naat_id ? `
                                <p><strong>Reported Naat:</strong> ${report.naat_title || 'Naat #' + report.reported_naat_id}</p>
                            ` : ''}
                            
                            ${report.reported_user_id ? `
                                <p><strong>Reported User:</strong> ${report.reported_user_name || 'User #' + report.reported_user_id}</p>
                            ` : ''}
                            
                            <p><strong>Description:</strong> ${report.description}</p>
                            
                            ${report.resolution ? `
                                <div class="resolution">
                                    <strong>Resolution:</strong> ${report.resolution}
                                    ${report.action_taken ? `<br><strong>Action:</strong> ${report.action_taken}` : ''}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="report-actions">
                            ${(userRole === 'admin' || userRole === 'moderator') && report.status === 'pending' ? `
                                <button onclick="showResolveForm(${report.report_id})" class="btn btn-primary">
                                    <i class="fas fa-check"></i> Resolve
                                </button>
                            ` : ''}
                            
                            ${(userRole === 'admin' || report.reporter_id === window.currentUser?.userId) ? `
                                <button onclick="deleteReport(${report.report_id})" class="btn btn-danger">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Show resolve form
        function showResolveForm(reportId) {
            const action = prompt('Select action:\n1. delete_naat - Delete the reported naat\n2. delete_user - Suspend reported user\n3. warning - Issue warning\n4. no_action - Take no action\n\nEnter action:');
            
            if (!action || !['delete_naat', 'delete_user', 'warning', 'no_action'].includes(action)) {
                showToast('Invalid action selected', 'error');
                return;
            }
            
            const resolution = prompt('Enter resolution notes:');
            if (!resolution) return;
            
            resolveReport(reportId, resolution, action);
        }
        
        // Resolve report
        async function resolveReport(reportId, resolution, action) {
            try {
                const response = await fetch(`/api/reports/${reportId}/resolve`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        resolution: resolution,
                        action_taken: action
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Report resolved successfully', 'success');
                    loadReports(currentReportsTab);
                } else {
                    showToast(data.message || 'Failed to resolve report', 'error');
                }
            } catch (error) {
                showToast('Error resolving report', 'error');
            }
        }
        
        // Delete report (admin can delete any, user can delete own)
        async function deleteReport(reportId) {
            if (!confirm('Are you sure you want to delete this report? This action cannot be undone.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/reports/${reportId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                if (data.success) {
                    showToast('Report deleted successfully', 'success');
                    loadReports(currentReportsTab);
                } else {
                    showToast(data.message || 'Failed to delete report', 'error');
                }
            } catch (error) {
                showToast('Error deleting report', 'error');
            }
        }
        
        // For cached pages
        if (document.readyState !== 'loading') {
            console.log('DOM already loaded');
            // Setup logout listener if needed
            const logoutLink = document.getElementById('logoutLink');
            if (logoutLink) {
                logoutLink.addEventListener('click', async function(e) {
                    e.preventDefault();
                    try {
                        await fetch('/api/auth/logout', { method: 'POST' });
                        window.location.href = '/';
                    } catch (error) {
                        console.error('Logout error:', error);
                    }
                });
            }
        }
    </script>
</body>
</html>
